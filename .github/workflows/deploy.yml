name: AutoDeploy CI/CD

on:
  push:
    branches:
      - main

# ----------------------------
# GLOBAL ENV (NO HARDCODING IN STEPS)
# ----------------------------
env:
  AWS_REGION: ap-south-1
  ALB_URL: http://autodeploy-alb-1495594165.ap-south-1.elb.amazonaws.com

jobs:
  ci:
    name: Test + Build + Deploy
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # CHECKOUT CODE
      # ----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------
      # PYTHON SETUP
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ----------------------------
      # INSTALL DEPENDENCIES
      # ----------------------------
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest requests

      # ----------------------------
      # UNIT TESTS
      # ----------------------------
      - name: Run Unit Tests
        run: pytest tests/test_unit.py -v

      # ----------------------------
      # INTEGRATION TESTS
      # ----------------------------
      - name: Run Integration Tests
        run: pytest tests/test_integration.py -v

      # ----------------------------
      # AWS AUTH
      # ----------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ----------------------------
      # LOGIN TO ECR
      # ----------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ----------------------------
      # SET REGISTRY
      # ----------------------------
      - name: Set ECR registry
        run: echo "REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV

      # ----------------------------
      # BUILD DOCKER IMAGE
      # ----------------------------
      - name: Build Docker image
        run: |
          docker build -t $REGISTRY/autodeploy:${{ github.sha }} .

      # ----------------------------
      # PUSH TO ECR
      # ----------------------------
      - name: Push to ECR
        run: |
          docker push $REGISTRY/autodeploy:${{ github.sha }}

      # ----------------------------
      # DEPLOY TO ECS
      # ----------------------------
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster autodeploy-cluster \
            --service autodeploy-service \
            --force-new-deployment

      # ----------------------------
      # WAIT FOR DEPLOYMENT
      # ----------------------------
      - name: Wait for deployment
        run: sleep 30

      # ----------------------------
      # SMOKE TEST (RETRY LOGIC)
      # ----------------------------
      - name: Smoke Test - Health Check
        run: |
          for i in {1..10}; do
            echo "Attempt $i: Checking health endpoint..."
            if curl -f $ALB_URL/health; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after retries"
          exit 1

      - name: Smoke Test - Root Endpoint
        run: |
          curl -f $ALB_URL/