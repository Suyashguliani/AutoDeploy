name: AutoDeploy CI/CD

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: autodeploy
  ECS_CLUSTER: autodeploy-cluster
  ECS_SERVICE: autodeploy-service

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      # -----------------------
      # Checkout
      # -----------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------
      # AWS Credentials
      # -----------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------
      # Login to ECR
      # -----------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------
      # Build Docker image
      # -----------------------
      - name: Build image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} .

      # -----------------------
      # Tag image for ECR
      # -----------------------
      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}

      # -----------------------
      # Push image to ECR
      # -----------------------
      - name: Push image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}

      # -----------------------
      # Render new task definition (IMPORTANT FIX)
      # -----------------------
      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition autodeploy-task \
            --query taskDefinition > task-def.json

      - name: Render new task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: app
          image: ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}

      # -----------------------
      # Deploy to ECS (REAL DEPLOY)
      # -----------------------
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # -----------------------
      # Smoke test (ALB)
      # -----------------------
      - name: Smoke test
        run: |
          curl -f ${{ secrets.ALB_URL }}/health
          curl -f ${{ secrets.ALB_URL }}/